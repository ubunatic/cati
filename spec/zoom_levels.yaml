# yaml-language-server: $schema=./schemas/zoom_levels.schema.json
$schema: "./schemas/zoom_levels.schema.json"
# Fixed k-values near 1:1 that aren't generated by the extension strategy.
# Only values >= 0.125 are kept; duplicates with the extension are harmless.
levels: 0.06125, 0.125, 0.25, 0.5, 1.0, 1.25, 1.5, 1.75, 2.0
# How to extend the zoom sequence from 1.0 up to the image width.
# halves   — 0.5 steps for k < 5, then 1.0 steps
# quarters — 0.25 steps for k < 2, then 0.5 steps for k < 5, then 1.0 steps
# adaptive — 0.25 steps for k < 2, 0.5 for k < 5, 1.0 for k < 15,
#            2.0 for k < 32, 4.0 for k < 64, then 8.0 steps
extend: adaptive
upscale_small_images: true
