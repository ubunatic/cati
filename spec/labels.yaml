# yaml-language-server: $schema=./schemas/labels.schema.json
# Cati Labels — non-button user-visible strings.
# Button text lives in spec/buttons.yaml; caps come from style.yaml buttons.left_cap/right_cap.
$schema: "./schemas/labels.schema.json"

# App identity
app_name: "Cati Browser"

# Header bar template — variables: {app_name} {dir} {page} {pages} {start} {end} {total}
header: " {app_name | cyn | bold }  [{dir}] — Page {page}/{pages} ({start}-{end} of {total})"

# Grid / list icons
folder_icon: "📁"
file_icon: "📄"

# Hint bars (bottom row, below the button row)
hint_browser: "{ active_file | dim }  { meta.src_res | dim }  { meta.duration | dim }  { preview_state | dim }  { queue_size | dim }  { last_key | dim }"
hint_settings: "Setting: { active_setting } — adjust:◀/▶  save:↵  cancel:Esc  { last_key | dim }"
hint_about: "{ last_key | dim }"
hint_viewer: "{ render_mode | dim }  S:{ ssim | dim } B:{ blockiness | dim } E:{ edge_cont | dim }  { meta.src_res | dim }  { meta.disp_res | dim }  { last_key | dim }"

# Settings page UI strings
settings_title: "CATI SETTINGS"
settings_hint_tab: "Press Tab to switch active setting."
settings_hint_adjust: "Use ↑ / ↓ to change value."
settings_hint_save: "Press Enter to Save, Esc to Cancel."

# External URLs
website_url: "https://codeberg.org/ubunatic/cati"
