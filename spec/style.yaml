# yaml-language-server: $schema=./schemas/style.schema.json
# Cati Browser Style
$schema: "./schemas/style.schema.json"

app:
  bg: slv
  border_style: double
  border_color: gry

buttons:
  fg: slv
  bg: null
  border_color: blk
  left_cap: "["
  right_cap: "]"
  active_fg: null
  active_bg: gry

preview:
  bg: null

control_bar:
  bg: null
  fg: gry

header_bar:
  fg: null
  bg: null
  bold: false

grid:
  item_fg: null
  item_bg: null
  selected_fg: wht
  selected_bg: gry
  selected_bold: true
  selected_marker: " "
  image_border: none

scroll_bar:
  thumb_char: "█"
  rail_char: "░"
  width: 2
  thumb_fg: slv
  rail_fg: null
  rail_bg: null

