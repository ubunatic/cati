# yaml-language-server: $schema=./schemas/config.schema.json
# Cati Config Defaults — values written to ~/.config/cati/config on first run
# when no user config exists. Edit ~/.config/cati/config to override.
$schema: "./schemas/config.schema.json"

config:
  preview_height: 40
  view_mode: grid
  max_jobs: 4
  video_frames: 8
  preview_videos: true
  video_preview_delay: 1000
